<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Image/Video Crawler</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0f1115; color: #e6e6e6;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
  }
  header { padding: 16px 20px; border-bottom: 1px solid #262a33; }
  header h1 { margin: 0 0 12px; font-size: 18px; font-weight: 600; }

  form { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  input[type=text], input[type=number] {
    background: #1a1d24; border: 1px solid #333844; color: #e6e6e6;
    padding: 8px 10px; border-radius: 6px; font-size: 13px;
  }
  #url { flex: 1 1 320px; min-width: 220px; }
  #maxImages { width: 110px; }
  label.chk { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #b6bcc8; }
  button {
    background: #3b5bdb; color: white; border: none; border-radius: 6px;
    padding: 8px 16px; font-size: 13px; cursor: pointer;
  }
  button:disabled { background: #2a2e38; color: #6b7280; cursor: not-allowed; }
  button.stop { background: #b3261e; }
  #status { font-size: 12px; color: #8a93a3; margin-top: 8px; }
  #status .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; background:#4b5160; }
  #status.running .dot { background:#37b24d; }

  main { display: flex; gap: 0; height: calc(100vh - 96px); }
  #filesPanel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #filterBar { padding: 10px 20px; border-bottom: 1px solid #262a33; }
  #filterBar input { width: 100%; max-width: 420px; }
  #grid {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px;
  }
  .card { background: #171a21; border: 1px solid #262a33; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
  .thumb { background: #0b0d11; height: 130px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .thumb img, .thumb video { max-width: 100%; max-height: 130px; object-fit: contain; }
  .card .meta { padding: 8px 10px; font-size: 11px; color: #9aa2b1; }
  .card .name { font-size: 12px; color: #e6e6e6; word-break: break-all; margin-bottom: 4px; }
  .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; background: #263042; color: #7fa8ff; margin-right: 4px; }
  .badge.video { background: #3a2540; color: #d693ff; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .tag { background: #202638; color: #a9b4c9; font-size: 10px; padding: 1px 6px; border-radius: 10px; }
  .tagform { display: flex; gap: 4px; margin-top: 6px; }
  .tagform input { flex: 1; padding: 4px 6px; font-size: 11px; }
  .tagform button { padding: 4px 8px; font-size: 11px; }

  #logPanel { width: 420px; border-left: 1px solid #262a33; display: flex; flex-direction: column; }
  #logHeader { padding: 10px 14px; font-size: 12px; color: #8a93a3; border-bottom: 1px solid #262a33; }
  #log {
    flex: 1; overflow-y: auto; background: #05070a; color: #7ee787;
    font-family: Consolas, Menlo, monospace; font-size: 11px; padding: 10px 14px; white-space: pre-wrap;
  }
</style>
</head>
<body>

<header>
  <h1>Image / Video Crawler</h1>
  <form id="startForm">
    <input id="url" type="text" placeholder="https://your-site.com/" required>
    <label class="chk"><input id="includeVideos" type="checkbox"> Include videos</label>
    <input id="maxImages" type="number" min="1" placeholder="Max (blank = unlimited)">
    <button id="startBtn" type="submit">Start crawl</button>
    <button id="stopBtn" class="stop" type="button" disabled>Stop</button>
  </form>
  <div id="status"><span class="dot"></span><span id="statusText">Idle</span></div>
</header>

<main>
  <div id="filesPanel">
    <div id="filterBar"><input id="filter" type="text" placeholder="Filter by filename, alt text, page title, or tag..."></div>
    <div id="grid"></div>
  </div>
  <div id="logPanel">
    <div id="logHeader">Crawl log</div>
    <div id="log"></div>
  </div>
</main>

<script>
const startForm = document.getElementById('startForm');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');
const logEl = document.getElementById('log');
const gridEl = document.getElementById('grid');
const filterEl = document.getElementById('filter');

let lastDownloaded = -1;

startForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const url = document.getElementById('url').value.trim();
  const include_videos = document.getElementById('includeVideos').checked;
  const maxImagesVal = document.getElementById('maxImages').value;
  const body = { url, include_videos };
  if (maxImagesVal) body.max_images = parseInt(maxImagesVal, 10);

  const res = await fetch('/api/start', {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) alert(data.error || 'Failed to start');
});

stopBtn.addEventListener('click', async () => {
  await fetch('/api/stop', { method: 'POST' });
});

let filterTimer = null;
filterEl.addEventListener('input', () => {
  clearTimeout(filterTimer);
  filterTimer = setTimeout(loadFiles, 300);
});

function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

async function addTag(localPath, inputEl) {
  const tag = inputEl.value.trim();
  if (!tag) return;
  await fetch('/api/tag', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ local_path: localPath, tag })
  });
  inputEl.value = '';
  loadFiles();
}

function renderCard(rec) {
  const src = '/media/' + rec.local_path.split('/').map(encodeURIComponent).join('/');
  const isVideo = rec.media_type === 'video';
  const thumb = isVideo
    ? `<video src="${src}" controls muted></video>`
    : `<img src="${src}" loading="lazy" alt="">`;
  const dims = (rec.width && rec.height) ? `${rec.width}x${rec.height}` : '';
  const tagPills = (rec.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="thumb">${thumb}</div>
    <div class="meta">
      <div class="name">${rec.local_path}</div>
      <span class="badge ${isVideo ? 'video' : ''}">${rec.media_type}</span>
      <span>${fmtSize(rec.file_size)}</span> <span>${dims}</span>
      <div class="tags">${tagPills}</div>
      <div class="tagform">
        <input type="text" placeholder="add tag">
        <button type="button">+</button>
      </div>
    </div>
  `;
  const tagInput = card.querySelector('.tagform input');
  const tagBtn = card.querySelector('.tagform button');
  tagBtn.addEventListener('click', () => addTag(rec.local_path, tagInput));
  tagInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTag(rec.local_path, tagInput); });
  return card;
}

async function loadFiles() {
  const q = filterEl.value.trim();
  const res = await fetch('/api/files' + (q ? '?q=' + encodeURIComponent(q) : ''));
  const records = await res.json();
  gridEl.innerHTML = '';
  records.forEach(rec => gridEl.appendChild(renderCard(rec)));
}

async function pollStatus() {
  const res = await fetch('/api/status');
  const data = await res.json();

  statusEl.classList.toggle('running', data.running);
  statusText.textContent = data.running
    ? `Running - ${data.downloaded} downloaded - ${data.elapsed_seconds}s elapsed`
    : `Idle - ${data.downloaded} downloaded`;
  startBtn.disabled = data.running;
  stopBtn.disabled = !data.running;

  logEl.textContent = data.log.join('\n');
  logEl.scrollTop = logEl.scrollHeight;

  if (data.downloaded !== lastDownloaded) {
    lastDownloaded = data.downloaded;
    loadFiles();
  }
}

loadFiles();
pollStatus();
setInterval(pollStatus, 1500);
</script>
</body>
</html>
